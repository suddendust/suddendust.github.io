<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Career Catalyst @ HRIT – CrackMyInterview</title>
  <meta name="description" content="The Career Catalyst – A Professional Employability Initiative by CrackMyInterview (CMI) @ HRIT. Crack the code to your tech career." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0A0F1E;
      color: #F9FAFB;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* NAV */
    nav {
      width: 100%;
      background: rgba(10,15,30,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-logo-icon {
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }
    .nav-logo-text {
      font-weight: 700;
      font-size: 16px;
      color: #F9FAFB;
      text-decoration: none;
    }
    .nav-logo-text span { color: #3B82F6; }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    /* MAIN */
    main {
      width: 100%;
      max-width: 600px;
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .event-badge {
      background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.15));
      border: 1px solid rgba(99,102,241,0.4);
      border-radius: 100px;
      padding: 6px 18px;
      font-size: 12px;
      font-weight: 600;
      color: #A5B4FC;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .flier-wrapper {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(59,130,246,0.15), 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .flier-wrapper img {
      width: 100%;
      display: block;
    }

    .cta-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .btn-register {
      display: inline-block;
      width: 100%;
      max-width: 320px;
      text-align: center;
      padding: 16px 32px;
      background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      border-radius: 12px;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 8px 32px rgba(59,130,246,0.35);
    }
    .btn-register:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .cta-note {
      font-size: 13px;
      color: #6B7280;
    }

    .info-cards {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .info-card {
      background: #161D2F;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
    }
    .info-card .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6B7280;
      margin-bottom: 6px;
    }
    .info-card .value {
      font-size: 14px;
      font-weight: 600;
      color: #F9FAFB;
    }

    footer {
      margin-top: auto;
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: #4B5563;
      border-top: 1px solid rgba(255,255,255,0.06);
      width: 100%;
    }
    footer a { color: #3B82F6; text-decoration: none; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="https://crackmyinterview.org" class="nav-logo">
        <div class="nav-logo-icon">CMI</div>
        <div class="nav-logo-text">CrackMy<span>Interview</span></div>
      </a>
    </div>
  </nav>

  <main>
    <div class="event-badge">HRIT × CrackMyInterview</div>

    <div class="flier-wrapper">
      <img src="hrit_hackathon_flier.png" alt="The Career Catalyst – A Professional Employability Initiative by CrackMyInterview @ HRIT" />
    </div>

    <div class="info-cards">
      <div class="info-card">
        <div class="label">Initiative</div>
        <div class="value">The Career Catalyst</div>
      </div>
      <div class="info-card">
        <div class="label">Teams</div>
        <div class="value">Groups of 3</div>
      </div>
      <div class="info-card">
        <div class="label">Winners Get</div>
        <div class="value">Mentorship + CMI Course</div>
      </div>
      <div class="info-card">
        <div class="label">Organized by</div>
        <div class="value">CMI @ HRIT</div>
      </div>
    </div>

    <div class="cta-section">
      <a href="https://crackmyinterview.org/contact" class="btn-register">Register Now →</a>
      <span class="cta-note">Coming Soon · Teams of 3 required</span>
    </div>
  </main>

  <footer>
    <a href="https://crackmyinterview.org">crackmyinterview.org</a> &nbsp;·&nbsp; A Professional Employability Initiative
  </footer>

</body>
</html>
