<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Career Catalyst @ HRIT – CrackMyInterview</title>
  <meta name="description" content="The Career Catalyst – A Professional Employability Initiative by CrackMyInterview (CMI) @ HRIT. Crack the code to your tech career." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0A0F1E;
      color: #F9FAFB;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* NAV */
    nav {
      width: 100%;
      background: rgba(10,15,30,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-logo-icon {
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }
    .nav-logo-text {
      font-family: 'Pacifico', cursive;
      font-weight: 400;
      font-size: 18px;
      color: #F9FAFB;
      text-decoration: none;
    }
    .nav-logo-text span { color: #3B82F6; }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    /* MAIN */
    main {
      width: 100%;
      max-width: 600px;
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .flier-wrapper {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(59,130,246,0.15), 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .flier-wrapper img {
      width: 100%;
      display: block;
    }

    .hackathon-cta {
      width: 100%;
      background: linear-gradient(135deg, rgba(59,130,246,0.1) 0%, rgba(139,92,246,0.1) 100%);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
    }
    .hackathon-cta h2 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hackathon-cta p {
      color: #9CA3AF;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .hackathon-cta .qr-code {
      width: 160px;
      height: 160px;
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      margin: 0 auto 20px;
    }
    .hackathon-cta .qr-code img {
      width: 100%;
      height: 100%;
    }
    .hackathon-cta .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .hackathon-cta .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59,130,246,0.4);
    }

    footer {
      margin-top: auto;
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: #4B5563;
      border-top: 1px solid rgba(255,255,255,0.06);
      width: 100%;
    }
    footer a { color: #3B82F6; text-decoration: none; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="https://crackmyinterview.org" class="nav-logo">
        <div class="nav-logo-icon">CMI</div>
        <div class="nav-logo-text">CrackMy<span>Interview</span></div>
      </a>
    </div>
  </nav>

  <main>
    <div class="flier-wrapper">
      <img src="hrit_hackathon_flier.png" alt="The Career Catalyst – A Professional Employability Initiative by CrackMyInterview @ HRIT" />
    </div>

    <div class="hackathon-cta">
      <h2>🚀 AI Hackathon Registration</h2>
      <p>Scan the QR code or click the button below to register</p>
      <div class="qr-code">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://forms.gle/cNXUF7YcdJLmBkEJ7" alt="AI Hackathon Registration QR Code" />
      </div>
      <a href="https://forms.gle/cNXUF7YcdJLmBkEJ7" target="_blank" rel="noopener" class="btn">
        Register Now →
      </a>
    </div>
  </main>

  <footer>
    <a href="https://crackmyinterview.org">crackmyinterview.org</a> &nbsp;·&nbsp; A Professional Employability Initiative
  </footer>

</body>
</html>
